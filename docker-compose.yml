services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: team-tournament-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://tournament_user:tournament_pass@postgres:5432/tournament
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: uploads
      CORS_ORIGINS: http://localhost:8081,http://localhost:19006,http://127.0.0.1:8081
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: team-tournament-postgres
    environment:
      POSTGRES_USER: tournament_user
      POSTGRES_PASSWORD: tournament_pass
      POSTGRES_DB: tournament
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tournament_user -d tournament"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: team-tournament-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
